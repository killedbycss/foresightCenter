<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>База стратегических экспертов</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script defer src="javascripts/scripts.js"></script>
    <link rel="icon" href="images/icon.ico" />
    <link rel="stylesheet" href="images/icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Форсайт" />
    <meta
      property="og:description"
      content="Пример визуального кода для базы стратегических экспертов"
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/tarasbalabaev/Gorky_Cinema/refs/heads/main/images/banner.png"
    />
    <meta
      property="og:url"
      content="https://tarasbalabaev.github.io/Gorky_Cinema/"
    />
  </head>
  <body>
    <section class="pageContent">
      <section class="pageEl">
        <img src="" alt="" />
        <button></button>
      </section>
      <section id="cardspagessearchFilter">
        <section id="cardspagesSearch">
          <section id="topBar">
            <section class="lineBar">
              <section id="appearanceSwitch">
                <button class="appearance"></button>
                <button class="appearance"></button>
              </section>
              <section id="search">
                <section class="textArea">
                  <section class="textInAreaF">
                    <p>Поиск по ФИО</p>
                  </section>
                </section>
                <section class="selectEl">
                  <img class="checkbox1" src="icons/checkbox1NoIcon.svg" />
                  <section class="textInAreaT">
                    <p>Искать по точному совпадению</p>
                  </section>
                </section>
              </section>
            </section>
            <section class="lineBar">
              <section class="results">
                <section class="results" id="results1">
                  <h1>Найдено:</h1>
                  <h1>99</h1>
                  <h1>результатов</h1>
                </section>
                <section class="results" id="results1">
                  <h2>Выбрано:</h2>
                  <h2>2</h2>
                  <h2>из</h2>
                  <h2>99</h2>
                </section>
                <section class="drop" id="sortBy">
                  <p>По ФИО</p>
                  <img src="icons/arrowIcon.svg" alt="" />
                </section>
                <section class="results" id="results1">
                  <section class="drop" id="formatDrop">
                    <h2>.xls</h2>
                    <img src="icons/arrowIcon.svg" alt="" />
                  </section>
                  <section class="drop" id="loadDrop">
                    <h2>.xls</h2>
                    <img src="icons/arrowIcon.svg" alt="" />
                  </section>
                  <section class="button" id="printButton">
                    <img src="icons/printIcon.svg" alt="" />
                    <h2>Скачать</h2>
                  </section>
                </section>
              </section>
            </section>
          </section>
          <section id="cardsPages">
            <section id="cardSquareList"></section>
            <section id="pages"></section>
          </section>
        </section>
        <section id="filterMenu"></section>
      </section>
      <section class="pageEl">
        <h2>НИУ ВШЭ / ИСИЭЗ / Форсайт-центр</h2>
        <h1>Обратная связь</h1>
      </section>
    </section>
  </body>
</html>
