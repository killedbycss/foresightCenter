<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>База стратегических экспертов</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script defer src="javascripts/scripts.js"></script>
    <link rel="icon" href="contents/favicon.ico" />
    <link rel="stylesheet" href="contents/favicon.png" />
    <script defer src="javascripts/scripts.js"></script>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Страница входа" />
    <meta
      property="og:description"
      content="Пример визуального кода для базы стратегических экспертов"
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/killedbycss/foresightCenter/refs/heads/main/contents/Cover.png"
    />
    <meta
      property="og:url"
      content="https://killedbycss.github.io/foresightCenter/"
    />
  </head>
  <body>
    <section class="pageContent">
      <section class="pageEl" id="wasteEl"></section>

      <section class="loginLogo">
        <img id="logo" src="contents/logo.svg" alt="" />
        <section class="login">
          <section class="loginAreas">
            <section class="loginArea">
              <section class="textPadding">
                <p>Почта или юзернейм</p>
              </section>
              <section class="textArea" id="loginText">
                <section class="textInAreaF">
                  <p>Имя пользователя</p>
                </section>
              </section>
            </section>
            <section class="loginArea">
              <section class="textPadding">
                <p>Пароль:</p>
                <h4>Неверный пароль</h4>
              </section>
              <section class="textArea" id="loginWrong1">
                <section class="textInAreaF">
                  <p>Пароль</p>
                </section>
              </section>
            </section>
          </section>
          <section id="loginVar">
            <section class="button" id="loginButton">
              <h2>Войти</h2>
            </section>
            <p>Зарегистрироваться</p>
          </section>
        </section>
      </section>
      <section class="pageEl">
        <h2>НИУ ВШЭ / ИСИЭЗ / Форсайт-центр</h2>
        <h1>Обратная связь</h1>
      </section>
    </section>
  </body>
</html>
